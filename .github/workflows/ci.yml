name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run linters
        run: make lint

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: make test-unit

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build sandbox Docker image
        run: make build-sandbox

      - name: Run integration tests
        run: make test-integration

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run quality checks
        run: make quality

  # -----------------------------------------------------------------------
  # Summary gate — set this as the single required status check in
  # GitHub Branch Protection → "build" must pass before merge.
  # -----------------------------------------------------------------------
  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint, test, integration, quality]
    if: always()
    steps:
      - name: Check upstream job results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ||
                "${{ needs.test.result }}" != "success" ||
                "${{ needs.integration.result }}" != "success" ||
                "${{ needs.quality.result }}" != "success" ]]; then
            echo "❌ One or more CI jobs failed or were cancelled."
            echo "  lint:        ${{ needs.lint.result }}"
            echo "  test:        ${{ needs.test.result }}"
            echo "  integration: ${{ needs.integration.result }}"
            echo "  quality:     ${{ needs.quality.result }}"
            exit 1
          fi
          echo "✅ All CI jobs passed."
