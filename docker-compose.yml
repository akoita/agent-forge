version: "3.9"

services:
  agent-forge-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    ports:
      - "8000:8000"
    environment:
      AGENT_FORGE_SERVICE_HOST: "0.0.0.0"
      AGENT_FORGE_SERVICE_PORT: "8000"
      AGENT_FORGE_SERVICE_ROOT_DIR: "/var/lib/agent-forge/service"
      AGENT_FORGE_SERVICE_AUTH_ENABLED: "true"
      AGENT_FORGE_SERVICE_CLIENTS_PATH: "/var/lib/agent-forge/service/clients.toml"
      AGENT_FORGE_QUEUE_BACKEND: "memory"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agent_forge_data:/var/lib/agent-forge
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  agent_forge_data:
  redis_data:
